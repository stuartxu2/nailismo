name: Nailismo
options:
  bundleIdPrefix: com.nailismo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
packages:
  Stripe:
    url: https://github.com/stripe/stripe-ios
    from: 24.0.0
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_LANGUAGE: en
    GENERATE_INFOPLIST_FILE: NO
targets:
  Nailismo:
    type: application
    platform: iOS
    sources:
      - path: Nailismo
        excludes:
          - "Resources/Info.plist"
    # Local, gitignored secrets (copy Secrets.example.xcconfig). Surfaced into
    # Info.plist build settings, read at runtime by Config.swift.
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    settings:
      base:
        PRODUCT_NAME: Nailismo
        PRODUCT_BUNDLE_IDENTIFIER: com.nailismo.app
        INFOPLIST_FILE: Nailismo/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        # Pass 1 verifies via the simulator, which needs no signing.
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
    dependencies:
      - package: Stripe
        product: StripePaymentSheet
