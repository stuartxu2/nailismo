  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Body font: Inter via Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* Headings font: Ekster — loaded locally */
    @font-face {
      font-family: 'Ekster';
      src: url('brand_assets/Font/Ekster/Ekster_Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'Ekster';
      src: url('brand_assets/Font/Ekster/Ekster_Bold.woff2') format('woff2');
      font-weight: 700;
      font-display: swap;
    }
    @font-face {
      font-family: 'Ekster';
      src: url('brand_assets/Font/Ekster/Ekster_Extrabold.woff2') format('woff2');
      font-weight: 800;
      font-display: swap;
    }
    @font-face {
      font-family: 'Ekster';
      src: url('brand_assets/Font/Ekster/Ekster_Black.woff2') format('woff2');
      font-weight: 900;
      font-display: swap;
    }
  </style>

  <!-- Tailwind custom-token config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neri:     '#FCFAF2',  // page background (練色)
            gofun:    '#FFFFFB',  // card / surface white (胡粉色)
            tetsu:    '#281A14',  // text / headings (鉄黒)
            akane:    '#B7282E',  // accent (茜色)
            shiracha: '#DDD3C0',  // borders / bands (利休白茶)
            nezumi:   '#BDC0BA',  // muted text (白鼠)
          },
          fontFamily: {
            display: ['Ekster', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
          letterSpacing: { tightest: '-0.03em' },
        },
      },
    };
  </script>
</head>
